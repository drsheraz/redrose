<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RedRose - Sweet Couple Relation</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f8f8f8;
}

header {
    background: #c0392b;
    color: white;
    text-align: center;
    padding: 20px;
}

header h1 {
    margin: 0;
}

header p {
    margin: 5px;
    font-style: italic;
}

nav {
    background: #922b21;
    padding: 10px;
    text-align: center;
}

nav button {
    margin: 5px;
    padding: 10px;
    border: none;
    background: white;
    cursor: pointer;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

textarea {
    width: 100%;
    height: 80px;
}

button.submit {
    background: #c0392b;
    color: white;
    margin-top: 10px;
}

footer {
    background: #333;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>

</head>

<body>

<header>
    <h1>🌹 RedRose.com</h1>
    <p>Sweet Couple Relation</p>
</header>

<nav>
    <button onclick="showSection('article')">Articles</button>
    <button onclick="showSection('quotes')">Quotes</button>
    <button onclick="showSection('ads')">Ads</button>
</nav>

<div class="container">

    <!-- Articles -->
    <div id="article" class="card">
        <h2>Write Article</h2>
        <textarea id="articleText" placeholder="Write your article..."></textarea>
        <button class="submit" onclick="addContent('articleText','articleList')">Add Article</button>
        <div id="articleList"></div>
    </div>

    <!-- Quotes -->
    <div id="quotes" class="card" style="display:none;">
        <h2>Write Quote</h2>
        <textarea id="quoteText" placeholder="Write your quote..."></textarea>
        <button class="submit" onclick="addContent('quoteText','quoteList')">Add Quote</button>
        <div id="quoteList"></div>
    </div>

    <!-- Ads -->
    <div id="ads" class="card" style="display:none;">
        <h2>Post Advertisement</h2>
        <textarea id="adsText" placeholder="Write your ad..."></textarea>
        <button class="submit" onclick="addContent('adsText','adsList')">Add Ad</button>
        <div id="adsList"></div>
    </div>

</div>

<footer>
    <p>© 2026 RedRose.com | Made for Practice</p>
</footer>

<script>
function showSection(section) {
    document.getElementById('article').style.display = 'none';
    document.getElementById('quotes').style.display = 'none';
    document.getElementById('ads').style.display = 'none';

    document.getElementById(section).style.display = 'block';
}

function addContent(inputId, listId) {
    let text = document.getElementById(inputId).value;

    if (text === "") {
        alert("Please write something first!");
        return;
    }

    let div = document.createElement("div");
    div.className = "card";
    div.innerText = text;

    document.getElementById(listId).appendChild(div);

    document.getElementById(inputId).value = "";
}
</script>

</body>
</html>
